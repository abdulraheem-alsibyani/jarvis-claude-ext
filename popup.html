<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Source+Serif+4:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ground: #262624;
        --surface: #30302e;
        --surface-hover: #383836;
        --ink: #f5f4ee;
        --ink-soft: #a8a59e;
        --clay: #c96442;
        --clay-hover: #d4724f;
        --border: #3d3d3a;
        --radius: 10px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: fit-content;
        align-items: center;
        background: var(--ground);
        color: var(--ink);

        font-family: "Source Serif 4", Georgia, serif;

        padding: 16px;
        border: solid;
        border-width: 1px;
        border-color: var(--clay-hover);
      }

      header {
        margin-bottom: 14px;
        color: linear-gradient(var(--ink), var(--clay));
      }

      h1 {
        font-size: 1.2rem;
        font-weight: 500;
        letter-spacing: -0.01em;
        cursor: default;
      }

      .subtitle {
        white-space: nowrap;
        cursor: default;
        font-size: 0.72rem;
        color: var(--ink-soft);
        margin-top: 2px;
      }

      .label {
        cursor: default;
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-soft);
        margin-bottom: 8px;
      }

      .modes {
        cursor: default;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      button {
        width: 130px;
        font-family: inherit;
        font-size: 0.85rem;
        text-align: middle;
        padding: 5px 12px;
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          transform 0.05s ease;
      }

      button:hover {
        border-color: var(--clay);
        background: var(--surface-hover);
        color: var(--clay);
      }

      button:active {
        transform: translateY(1px);
      }

      button.active {
        background: var(--clay);
        border-color: var(--clay);
        color: var(--ink);
        font-weight: 500;
      }

      button.active:hover {
        background: var(--clay-hover);
      }

      .off-row {
        margin-top: 4px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }

      button[data-mode=""] {
        color: var(--ink-soft);
        font-size: 0.8rem;
      }

      button[data-mode=""].active {
        color: #fff;
      }

      footer {
        margin-top: 12px;
        font-size: 0.72rem;
        color: var(--ink-soft);
      }

      footer .current {
        color: var(--clay-hover);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Jarvis</h1>
      <p class="subtitle">Jarvis, inject it.</p>
    </header>

    <p class="label">Response mode</p>
    <div class="modes">
      <button data-mode="1 line">One line</button>
      <button data-mode="1 paragraph">One paragraph</button>
      <button data-mode="go deep">Go deep</button>
      <button data-mode="search the web">Jearch the web</button>
      <div class="off-row">
        <button data-mode="">No mode</button>
      </div>
    </div>

    <footer>Active: <span class="current" id="current">none</span></footer>

    <script src="popup.js"></script>
  </body>
</html>
